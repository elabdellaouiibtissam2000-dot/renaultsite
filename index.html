<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renault Digital Showroom</title>
    <style>
        :root { --renault-yellow: #ffc400; --dark-bg: #0a0a0a; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark-bg); color: white; scroll-behavior: smooth; }
        
        /* Hero Section */
        .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -1; filter: brightness(0.4); }
        .hero-text { text-align: center; z-index: 1; }
        .hero-text h1 { font-size: clamp(3rem, 10vw, 5rem); letter-spacing: 8px; margin: 0; font-weight: 900; }
        .hero-text p { color: var(--renault-yellow); font-size: 1.2rem; letter-spacing: 3px; }

        /* Grid Section */
        .container { padding: 80px 5%; }
        .section-title { text-align: center; margin-bottom: 50px; font-size: 2rem; border-bottom: 2px solid var(--renault-yellow); display: inline-block; padding-bottom: 10px; }
        .models-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        /* Modern Cards */
        .card { 
            background: #151515; border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
        }
        .card:hover { transform: scale(1.05); border-color: var(--renault-yellow); box-shadow: 0 10px 30px rgba(255,196,0,0.2); }
        .card-img-wrapper { height: 200px; width: 100%; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }
        .card-info { padding: 20px; text-align: left; }
        .card-info h3 { margin: 0; font-size: 1.4rem; color: #fff; }
        .card-info p { color: #888; font-size: 0.9rem; margin: 10px 0; }
        .btn-more { background: var(--renault-yellow); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }

        /* Professional Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { 
            background: #111; margin: 5% auto; padding: 0; border-radius: 25px; 
            width: 90%; max-width: 700px; overflow: hidden; border: 1px solid var(--renault-yellow);
            animation: modalIn 0.4s ease-out;
        }
        @keyframes modalIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .modal-header img { width: 100%; height: 350px; object-fit: cover; }
        .modal-body { padding: 30px; text-align: center; }
        .close-modal { position: absolute; right: 25px; top: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

    <section class="hero">
        <video autoplay loop muted playsinline>
            <source src="video-renault.mp4" type="video/mp4">
        </video>
        <div class="hero-text">
            <h1>RENAULT</h1>
            <p>DRIVE THE FUTURE</p>
        </div>
    </section>

    <div class="container" id="gallery">
        <center><h2 class="section-title">NOS MODÈLES 2026</h2></center>
        
        <div class="models-grid">
            <div class="card" onclick="openModal('Renault Clio', 'https://images.unsplash.com/photo-1619105470002-3f140654366a?auto=format&fit=crop&q=80&w=800', 'La citadine référence. Design sensuel, intérieur high-tech et motorisation hybride E-Tech.')">
                <div class="card-img-wrapper"><img src="https://images.unsplash.com/photo-1619105470002-3f140654366a?auto=format&fit=crop&q=80&w=800"></div>
                <div class="card-info"><h3>Clio V</h3><p>Hybride & Essence</p><button class="btn-more">Détails</button></div>
            </div>

            <div class="card" onclick="openModal('Megane E-Tech', 'https://images.unsplash.com/photo-1655819777141-86e580e2247b?auto=format&fit=crop&q=80&w=800', 'La révolution électrique. Jusqu\'à 450km d\'autonomie et un système OpenR link ultra fluide.')">
                <div class="card-img-wrapper"><img src="https://images.unsplash.com/photo-1655819777141-86e580e2247b?auto=format&fit=crop&q=80&w=800"></div>
                <div class="card-info"><h3>Megane E-Tech</h3><p>100% Électrique</p><button class="btn-more">Détails</button></div>
            </div>

            <div class="card" onclick="openModal('Renault Austral', 'https://images.unsplash.com/photo-1695653422715-991ec3a0db7a?auto=format&fit=crop&q=80&w=800', 'Le SUV premium de Renault. Confort exceptionnel et technologie 4Control advanced.')">
                <div class="card-img-wrapper"><img src="https://images.unsplash.com/photo-1695653422715-991ec3a0db7a?auto=format&fit=crop&q=80&w=800"></div>
                <div class="card-info"><h3>Austral</h3><p>SUV Hybride</p><button class="btn-more">Détails</button></div>
            </div>

            <div class="card" onclick="openModal('Renault Arkana', 'https://images.unsplash.com/photo-1632243193444-09971871221b?auto=format&fit=crop&q=80&w=800', 'Le SUV coupé audacieux. Sportivité et habitabilité réunies.')">
                <div class="card-img-wrapper"><img src="https://images.unsplash.com/photo-1632243193444-09971871221b?auto=format&fit=crop&q=80&w=800"></div>
                <div class="card-info"><h3>Arkana</h3><p>Coupé SUV</p><button class="btn-more">Détails</button></div>
            </div>

            <div class="card" onclick="openModal('Renault Captur', 'https://images.unsplash.com/photo-1552650272-b8a34e21bc4b?auto=format&fit=crop&q=80&w=800', 'Le SUV urbain le plus vendu. Compact à l\'extérieur, immense à l\'intérieur.')">
                <div class="card-img-wrapper"><img src="https://images.unsplash.com/photo-1552650272-b8a34e21bc4b?auto=format&fit=crop&q=80&w=800"></div>
                <div class="card-info"><h3>Captur</h3><p>SUV Urbain</p><button class="btn-more">Détails</button></div>
            </div>

            <div class="card" onclick="openModal('Renault Rafale', 'https://images.unsplash.com/photo-1707324317135-23c214c77f80?auto=format&fit=crop&q=80&w=800', 'Le nouveau sommet de la gamme. Design aéronautique et puissance hybride de 300ch.')">
                <div class="card-img-wrapper"><img src="https://images.unsplash.com/photo-1707324317135-23c214c77f80?auto=format&fit=crop&q=80&w=800"></div>
                <div class="card-info"><h3>Rafale</h3><p>Luxury SUV</p><button class="btn-more">Détails</button></div>
            </div>

            <div class="card" onclick="openModal('Twingo Electric', 'https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&q=80&w=800', 'L\'agilité urbaine ultime. 100% électrique pour vos trajets quotidiens.')">
                <div class="card-img-wrapper"><img src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&q=80&w=800"></div>
                <div class="card-info"><h3>Twingo</h3><p>Électrique</p><button class="btn-more">Détails</button></div>
            </div>
        </div>
    </div>

    <div id="mainModal" class="modal">
        <span class="close-modal" onclick="closeM()">&times;</span>
        <div class="modal-content">
            <div class="modal-header"><img id="mImg" src=""></div>
            <div class="modal-body">
                <h2 id="mTitle" style="color:var(--renault-yellow)"></h2>
                <p id="mDesc" style="line-height: 1.6; color: #ccc;"></p>
                <button class="btn-more" style="padding: 12px 30px;" onclick="closeM()">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(title, img, desc) {
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mImg').src = img;
            document.getElementById('mDesc').innerText = desc;
            document.getElementById('mainModal').style.display = "block";
        }
        function closeM() { document.getElementById('mainModal').style.display = "none"; }
        window.onclick = function(e) { if(e.target.className == 'modal') closeM(); }
    </script>
</body>
</html>
