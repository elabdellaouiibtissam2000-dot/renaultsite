<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renault Showroom - Expérience Client</title>
    <style>
        :root {
            --renault-yellow: #ffcc00;
            --bg-dark: #111111;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            scroll-behavior: smooth;
        }

        /* الواجهة الكبيرة - Hero Section */
        .hero {
            height: 100vh; /* كاتاخد الشاشة كاملة */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://assets.renaultgroup.com/uploads/2024/11/renault-rafale-carrousel-mobile.jpg?format=webp&width=3840');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--renault-yellow);
        }

        .hero img {
            width: 120px;
            margin-bottom: 20px;
            background: var(--renault-yellow);
            padding: 10px;
            border-radius: 10px;
        }

        .hero h1 {
            font-size: 4rem;
            color: white;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--renault-yellow);
            margin-top: 10px;
        }

        /* السهم للنزول */
        .scroll-down {
            margin-top: 50px;
            font-size: 2rem;
            color: white;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* شبكة الموديلات */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 80px auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: white;
            border-left: 5px solid var(--renault-yellow);
            padding-left: 15px;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: var(--renault-yellow);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-content {
            padding: 25px;
            text-align: center;
        }

        .card-content h3 {
            color: var(--renault-yellow);
            margin-bottom: 15px;
            font-size: 1.6rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--renault-yellow);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: white; transform: scale(1.1); }

        footer { padding: 50px; text-align: center; color: #555; border-top: 1px solid #222; }
    </style>
</head>
<body>

<section class="hero">
    <img src="https://assets.renaultgroup.com/uploads/2024/11/marque-renault-embleme-mobile.jpg?format=webp&width=3840" alt="Logo">
    <h1>RENAULT SHOWROOM</h1>
    <p>L'excellence automobile à votre portée</p>
    <div class="scroll-down">↓</div>
</section>

<div class="container">
    <div style="text-align:center;"><h2 class="section-title">NOS MODÈLES</h2></div>
    
    <div class="grid">
        <div class="card">
            <img src="https://www.wandaloo.com/files/Voiture-Neuve/renault-megane-sedan.jpg" alt="Mégane">
            <div class="card-content">
                <h3>Mégane Sedan</h3>
                <a href="#" class="btn">Découvrir</a>
            </div>
        </div>

        <div class="card">
            <img src="https://assets.renaultgroup.com/uploads/2024/11/renault-rafale-carrousel-mobile.jpg?format=webp&width=3840" alt="Rafale">
            <div class="card-content">
                <h3>Renault Rafale</h3>
                <a href="#" class="btn">Découvrir</a>
            </div>
        </div>

        
    &copy; 2026 Renault Morocco - Présentation Gestion Expérience Client
</footer>

</body>
