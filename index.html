<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renault Showroom - Expérience Client</title>
    <style>
        :root {
            --renault-yellow: #ffcc00;
            --bg-dark: #111111;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            scroll-behavior: smooth;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5)), 
                        url('https://assets.renaultgroup.com/uploads/2024/11/renault-rafale-carrousel-mobile.jpg?format=webp&width=3840');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--renault-yellow);
        }

        .hero img { width: 120px; margin-bottom: 20px; background: var(--renault-yellow); padding: 10px; border-radius: 10px; }
        .hero h1 { font-size: 3.5rem; margin: 0; text-transform: uppercase; font-weight: 900; }
        .hero p { font-size: 1.2rem; color: var(--renault-yellow); margin-top: 10px; letter-spacing: 2px; }

        /* Container & Grid */
        .container { width: 90%; max-width: 1200px; margin: 60px auto; }
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 50px; color: var(--renault-yellow); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.4s;
            cursor: pointer;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--renault-yellow); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; text-align: center; }
        .card-content h3 { margin: 0 0 15px; font-size: 1.4rem; }

        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: var(--renault-yellow);
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        /* Modal Style */
        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            background-color: #1e1e1e; margin: 10% auto; padding: 30px;
            border: 2px solid var(--renault-yellow); width: 60%; border-radius: 15px;
            text-align: center; position: relative;
        }
        .close { color: var(--renault-yellow); float: right; font-size: 30px; cursor: pointer; font-weight: bold; }

        footer { text-align: center; padding: 40px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

<section class="hero">
    <img src="https://assets.renaultgroup.com/uploads/2024/11/marque-renault-embleme-mobile.jpg?format=webp&width=3840" alt="Logo">
    <h1>RENAULT SHOWROOM</h1>
    <p>ÉLÉGANCE ET INNOVATION</p>
</section>

<div class="container">
    <h2 class="section-title">NOS MODÈLES</h2>
    <div class="grid">
        
        <div class="card" onclick="openModal('Mégane Sedan')">
            <img src="https://www.wandaloo.com/files/Voiture-Neuve/renault-megane-sedan.jpg" alt="Mégane">
            <div class="card-content">
                <h3>Mégane Sedan</h3>
                <button class="btn">Détails</button>
            </div>
        </div>

        <div class="card" onclick="openModal('Renault Rafale')">
            <img src="https://assets.renaultgroup.com/uploads/2024/11/renault-rafale-carrousel-mobile.jpg?format=webp&width=3840" alt="Rafale">
            <div class="card-content">
                <h3>Renault Rafale</h3>
                <button class="btn">Détails</button>
            </div>
        </div>

        <div class="card" onclick="openModal('Renault Kardian')">
            <img src="https://www.lesiteinfo.com/wp-content/uploads/2024/11/Renault-Kardian-1.jpg" alt="Kardian">
            <div class="card-content">
                <h3>Renault Kardian</h3>
                <button class="btn">Détails</button>
            </div>
        </div>

        <div class="card" onclick="openModal('5 E-Tech Electric')">
            <img src="https://cdn-datak.motork.net/configurator-imgs/cars/fr/400/RENAULT/5-E-TECH-ELECTRIC/44521_BERLINE-A-HAYON-5-PORTES/renault-5-etech-front-view.jpg" alt="R5">
            <div class="card-content">
                <h3>5 E-Tech Electric</h3>
                <button class="btn">Détails</button>
            </div>
        </div>

        <div class="card" onclick="openModal('Nouvelle Gamme')">
            <img src="https://images.caradisiac.com/logos/2/5/2/5/262525/S0-renault-commence-a-abandonner-le-diesel-185529.jpg" alt="Diesel">
            <div class="card-content">
                <h3>Gamme Future</h3>
                <button class="btn">Détails</button>
            </div>
        </div>

        <div class="card" onclick="openModal('Renault Clio')">
            <img src="https://www.wandaloo.com/files/Voiture-Neuve/renault-megane-sedan.jpg" alt="Clio">
            <div class="card-content">
                <h3>Renault Clio</h3>
                <button class="btn">Détails</button>
            </div>
        </div>

        <div class="card" onclick="openModal('Renault Captur')">
            <img src="https://www.lesiteinfo.com/wp-content/uploads/2024/11/Renault-Kardian-1.jpg" alt="Captur">
            <div class="card-content">
                <h3>Renault Captur</h3>
                <button class="btn">Détails</button>
            </div>
        </div>

    </div>
</div>

<div id="myModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle" style="color:#ffcc00"></h2>
    <p id="modalDescription" style="font-size: 18px; line-height: 1.6;"></p>
  </div>
</div>

<footer>
    &copy; 2026 Renault Showroom - Projet Gestion Expérience Client
</footer>

<script>
    const descriptions = {
        "Mégane Sedan": "Berline élégante offrant un confort supérieur et une sécurité maximale pour l'expérience client.",
        "Renault Rafale": "Le summum de l'innovation hybride Renault avec un design audacieux et aérodynamique.",
        "Renault Kardian": "Le nouveau SUV compact fabriqué au Maroc, alliant agilité urbaine et robustesse.",
        "5 E-Tech Electric": "La réinvention d'une icône en version 100% électrique pour une mobilité durable.",
        "Nouvelle Gamme": "Découvrez notre transition vers des énergies plus propres et des moteurs hybrides performants.",
        "Renault Clio": "La citadine préférée des Marocains, offrant polyvalence et technologie embarquée.",
        "Renault Captur": "SUV urbain personnalisable avec une position de conduite haute et un confort exceptionnel."
    };

    function openModal(model) {
        document.getElementById("modalTitle").innerText = model;
        document.getElementById("modalDescription").innerText = descriptions[model];
        document.getElementById("myModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("myModal").style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById("myModal")) {
            closeModal();
        }
    }
</script>

</body>
</html>
