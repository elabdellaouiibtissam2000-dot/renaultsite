<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renault Experience | 7 Modèles</title>
    <style>
        :root { --renault-yellow: #ffc400; --dark-bg: #0a0a0a; }
        body, html { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: var(--dark-bg); color: white; overflow-x: hidden; }
        
        /* Background Video */
        .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -1; filter: brightness(0.4); }
        .hero-text { text-align: center; z-index: 1; }
        .hero-text h1 { font-size: 3.5rem; letter-spacing: 5px; margin: 0; }

        /* Grid des Modèles */
        .models-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; padding: 50px 5%; background: var(--dark-bg);
        }

        .card { 
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1); 
            transition: 0.3s; cursor: pointer;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--renault-yellow); background: rgba(255,196,0,0.05); }
        .card img { width: 100%; border-radius: 10px; height: 180px; object-fit: cover; }
        .card h3 { margin: 15px 0 5px; color: var(--renault-yellow); }

        /* Modal (Pop-up) */
        .modal { 
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: #1a1a1a; margin: 10% auto; padding: 30px; border-radius: 20px; 
            width: 80%; max-width: 500px; text-align: center; border: 2px solid var(--renault-yellow);
        }
        .modal-content img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .close { color: white; float: right; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <section class="hero">
        <video autoplay loop muted playsinline>
            <source src="video-renault.mp4" type="video/mp4">
        </video>
        <div class="hero-text">
            <h1>RENAULT</h1>
            <p style="color:var(--renault-yellow)">LINE-UP 2026</p>
        </div>
    </section>

    <div class="models-grid">
        <div class="card" onclick="showCar('Clio', 'clio.jpg', 'La citadine iconique, parfaite pour la ville avec son design dynamique.')">
            <img src="clio.jpg" alt="Clio">
            <h3>Renault Clio</h3>
        </div>
        <div class="card" onclick="showCar('Megane E-Tech', 'megane.jpg', '100% électrique. Une révolution technologique avec un design élégant.')">
            <img src="megane.jpg" alt="Megane">
            <h3>Megane E-Tech</h3>
        </div>
        <div class="card" onclick="showCar('Captur', 'captur.jpg', 'Le SUV urbain polyvalent et personnalisable.')">
            <img src="captur.jpg" alt="Captur">
            <h3>Renault Captur</h3>
        </div>
        <div class="card" onclick="showCar('Austral', 'austral.jpg', 'Le nouveau SUV high-tech avec système E-Tech full hybrid.')">
            <img src="austral.jpg" alt="Austral">
            <h3>Renault Austral</h3>
        </div>
        <div class="card" onclick="showCar('Arkana', 'arkana.jpg', 'Le SUV coupé sportif qui allie élégance et fluidité.')">
            <img src="arkana.jpg" alt="Arkana">
            <h3>Renault Arkana</h3>
        </div>
        <div class="card" onclick="showCar('Rafale', 'rafale.jpg', 'Le nouveau vaisseau amiral au design audacieux.')">
            <img src="rafale.jpg" alt="Rafale">
            <h3>Renault Rafale</h3>
        </div>
        <div class="card" onclick="showCar('Twingo', 'twingo.jpg', 'Petite, agile et fun. Idéale pour se faufiler partout.')">
            <img src="twingo.jpg" alt="Twingo">
            <h3>Renault Twingo</h3>
        </div>
    </div>

    <div id="carModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="">
            <h2 id="modalTitle" style="color:var(--renault-yellow)"></h2>
            <p id="modalDesc"></p>
        </div>
    </div>

    <script>
        function showCar(name, img, desc) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('carModal').style.display = "block";
        }
        function closeModal() {
            document.getElementById('carModal').style.display = "none";
        }
        window.onclick = function(event) {
            if (event.target == document.getElementById('carModal')) closeModal();
        }
    </script>
</body>
</html>
